{% extends 'base.html' %}
{% load static %}

{% block title %}Depo - Reyon - BackStore{% endblock %}

{% block content %}
<style>
    body {
        padding-top: 70px;
    }

    .warehouse-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: calc(100vh - 70px);
        padding: 40px 20px;
    }

    .warehouse-card {
        background: white;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
    }

    .warehouse-title {
        font-size: 28px;
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 30px;
        text-align: center;
    }

    .form-wrapper {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
    }

    .form-group {
        margin-bottom: 0;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 10px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .form-group select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        color: #2c3e50;
        background-color: white;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .form-group select:hover {
        border-color: #3498db;
    }

    .form-group select:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        color: #2c3e50;
        background-color: white;
        transition: all 0.3s ease;
    }

    .form-group input:hover {
        border-color: #3498db;
    }

    .form-group input:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    .input-wrapper {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
    }

    .button-wrapper {
        display: flex;
        gap: 5%;
    }

    .btn-send {
        width: 70%;
        background: #27ae60;
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .btn-send:hover {
        background: #229954;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
    }

    .btn-send:active {
        transform: translateY(0);
    }

    .btn-secondary {
        width: 25%;
        background: #95a5a6;
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .btn-secondary:hover {
        background: #7f8c8d;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(127, 140, 141, 0.3);
    }

    .btn-secondary:active {
        transform: translateY(0);
    }

    @media (max-width: 768px) {
        .warehouse-card {
            max-width: 100%;
        }

        .warehouse-title {
            font-size: 24px;
        }

        .form-wrapper {
            grid-template-columns: 1fr;
        }

        .input-wrapper {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="warehouse-container">
    <div class="warehouse-card">
        <div class="warehouse-title">Depo - Reyon</div>

        <form id="warehouseForm" method="GET">
            <div class="form-wrapper">
                <div class="form-group">
                    <label for="location1">Gönderen Depo</label>
                    <select id="location1" name="location1" required>
                        <option value="">-- Seçiniz --</option>
                        {% for location in locations %}
                            <option value="{{ location }}">{{ location }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="location2">Alan Depo</label>
                    <select id="location2" name="location2" required>
                        <option value="">-- Seçiniz --</option>
                        {% for location in locations %}
                            <option value="{{ location }}">{{ location }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="input-wrapper">
                <div class="form-group">
                    <label for="barcode">Barkod</label>
                    <input type="text" id="barcode" name="barcode" placeholder="Barkod girin..." required>
                </div>

                <div class="form-group">
                    <label for="quantity">Adet</label>
                    <input type="number" id="quantity" name="quantity" placeholder="0" min="1" required>
                </div>
            </div>

            <div class="button-wrapper">
                <button type="submit" class="btn-send">Gönder</button>
                <button type="reset" class="btn-secondary">Temizle</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
