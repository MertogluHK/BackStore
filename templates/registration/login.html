{% extends 'base.html' %}
{% load static %}

{% block title %}Giriş Yap - Stok Kontrol{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-header bg-dark text-white text-center py-4">
                    <h2><i class="fas fa-sign-in-alt"></i> Giriş Yap</h2>
                </div>
                <div class="card-body p-4">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Kullanıcı Adı</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ username }}" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Şifre</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 mb-3">Giriş Yap</button>
                    </form>
                    
                    <hr>
                    <p class="text-center">Henüz hesabınız yok mu? 
                        <a href="{% url 'register' %}" class="text-decoration-none">Kaydol</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
